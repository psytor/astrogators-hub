name: astrogators-hub

services:
  astrogators-hub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Vite inlines these at build time; passed through from .env at the repo root.
        VITE_ASTROGATORS_TABLE_URL: ${VITE_ASTROGATORS_TABLE_URL}
        VITE_MOD_LEDGER_UI_URL: ${VITE_MOD_LEDGER_UI_URL}
    image: astrogators-hub:latest
    container_name: astrogators-hub
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173/"]
      interval: 30s
      timeout: 5s
      retries: 3
